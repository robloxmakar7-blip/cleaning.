<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ваш Клининг Ульяновск</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; padding-bottom: 120px; }
        .container { background: var(--card); padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 5px; color: var(--primary); }
        .city { text-align: center; font-size: 14px; color: #8E8E93; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 15px; }
        select, input { width: 100%; padding: 14px; border: 1px solid #D1D1D6; border-radius: 12px; font-size: 16px; margin-bottom: 20px; background: #F9F9FB; }
        .extra-item { display: flex; align-items: center; justify-content: space-between; background: #F2F2F7; padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; }
        .extra-item input { width: 22px; height: 22px; margin: 0; }
        .footer-price { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); border: 2px solid var(--primary); text-align: center; }
        .total-val { font-size: 28px; font-weight: 800; color: var(--primary); }
        .contact-link { display: block; margin-top: 10px; color: #1C1C1E; text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ВАШ КЛИНИНГ 🧼</h1>
    <div class="city">Ульяновск</div>

    <label>Тип уборки:</label>
    <select id="type" onchange="calc()">
        <option value="79">Влажная (79₽/м²)</option>
        <option value="130">Генеральная (130₽/м²)</option>
    </select>

    <label>Площадь квартиры (м²):</label>
    <input type="number" id="area" value="40" oninput="calc()">

    <label>Дополнительно:</label>
    <div class="extra-item"><span>Холодильник (+500₽)</span><input type="checkbox" id="f" onchange="calc()"></div>
    <div class="extra-item"><span>Духовка (+500₽)</span><input type="checkbox" id="o" onchange="calc()"></div>
    <div class="extra-item"><span>Окна (+400₽/шт)</span><input type="checkbox" id="w" onchange="calc()"></div>
</div>

<div class="footer-price">
    <div style="font-size: 14px; color: #666;">Итоговая стоимость:</div>
    <div class="total-val"><span id="res">3160</span> ₽</div>
    <a href="tel:+79041852445" class="contact-link">+7 (904) 185-24-45</a>
    <a href="tel:+79378850125" class="contact-link">+7 (937) 885-01-25</a>
</div>

<script>
    function calc() {
        const t = document.getElementById('type').value;
        const a = document.getElementById('area').value;
        let s = t * a;
        if(document.getElementById('f').checked) s += 500;
        if(document.getElementById('o').checked) s += 500;
        if(document.getElementById('w').checked) s += 400;
        document.getElementById('res').innerText = Math.round(s);
    }
</script>

</body>
</html>
